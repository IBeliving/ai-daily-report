# AI Daily Report 配置

# RSS 订阅源
sources:
  rss:
    - name: "Hacker News"
      url: "https://news.ycombinator.com/rss"
      category: "技术"
      weight: 1.0
    
    - name: "GitHub Trending 中文"
      url: "https://rsshub.app/github/trending/javascript,daily"
      category: "开源项目"
      weight: 1.0
    
    - name: "GitHub Trending 全站"
      url: "https://rsshub.app/github/trending/daily"
      category: "开源项目"
      weight: 0.8
    
    - name: "AI Weekly"
      url: "https://aiweekly.co/rss"
      category: "AI"
      weight: 1.0
    
    - name: "机器之心"
      url: "https://www.jiqizhixin.com/rss"
      category: "AI"
      weight: 1.0
    
    - name: "InfoQ 前端"
      url: "https://rsshub.app/infoq/recommend"
      category: "行业动态"
      weight: 0.8

  # 其他数据源配置
  github:
    trending: true
    languages:
      - "javascript"
      - "typescript"
      - "python"
    since: "daily"  # daily, weekly, monthly

# AI 模型配置
ai:
  model: "kimi-k2.5"  # 或其他支持的模型
  temperature: 0.7
  maxTokens: 500
  baseURL: "https://api.moonshot.cn/v1"  # Kimi API 地址
  # baseURL: "https://api.openai.com/v1"  # OpenAI
  # baseURL: "https://api.deepseek.com/v1"  # DeepSeek

# 日报生成配置
report:
  title: "AI Daily Report"
  subtitle: "每日 AI 与技术资讯精选"
  language: "zh-CN"
  maxArticles: 20           # 每日最多展示文章数
  maxArticlesPerSource: 5   # 每个来源最多取多少条
  summaryLength: 150        # 摘要字数限制
  
  # 分类配置
  categories:
    - name: "AI"
      color: "#8b5cf6"
      icon: "🤖"
    - name: "开源项目"
      color: "#10b981"
      icon: "📦"
    - name: "技术"
      color: "#3b82f6"
      icon: "💻"
    - name: "行业动态"
      color: "#f59e0b"
      icon: "📰"

# 网站配置
website:
  theme: "light"  # light, dark, auto
  showDate: true
  showSource: true
  showReadTime: true
  enableSearch: false
  footerText: "Generated by AI · Updated daily at 08:00 CST"
